name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Smoke editable install
        run: python -m pip install -e '.[dev,qr]'
      - name: Package metadata
        run: |
          python - <<'PY'
          import importlib.metadata as metadata

          distribution = metadata.distribution("r1-hermes")
          assert distribution.metadata["Name"] == "r1-hermes"
          assert distribution.metadata["Requires-Python"] == ">=3.10"

          scripts = [
              entry_point
              for entry_point in distribution.entry_points
              if entry_point.group == "console_scripts" and entry_point.name == "r1-hermes"
          ]
          assert scripts, "missing r1-hermes console script"
          PY
          python -m pip check
      - name: Dependency audit
        run: |
          python -m pip_audit . --strict --progress-spinner off
          python -m pip_audit --local --progress-spinner off --skip-editable
      - name: CLI help smoke
        run: |
          r1-hermes --help
          r1-hermes serve --help
          r1-hermes hermes --help
          r1-hermes payload --help
          r1-hermes qr --help
          r1-hermes probe --help
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q src tests
      - name: Build distributions
        run: |
          rm -rf dist build
          python -m build --sdist --wheel
      - name: Verify wheel install
        run: |
          wheel_artifacts=(dist/*.whl)
          test "${#wheel_artifacts[@]}" -eq 1
          wheel_venv="$RUNNER_TEMP/r1-hermes-wheel"
          python -m venv "$wheel_venv"
          "$wheel_venv/bin/python" -m pip install --upgrade pip
          "$wheel_venv/bin/python" -m pip install "${wheel_artifacts[0]}"
          "$wheel_venv/bin/python" -m pip check
          "$wheel_venv/bin/r1-hermes" --help
      - name: Verify wheel QR extra
        run: |
          wheel_artifacts=(dist/*.whl)
          test "${#wheel_artifacts[@]}" -eq 1
          wheel_qr_venv="$RUNNER_TEMP/r1-hermes-wheel-qr"
          python -m venv "$wheel_qr_venv"
          "$wheel_qr_venv/bin/python" -m pip install --upgrade pip
          "$wheel_qr_venv/bin/python" -m pip install "${wheel_artifacts[0]}[qr]"
          "$wheel_qr_venv/bin/python" -m pip check
          dummy_qr_token="dummy-ci-qr-token-do-not-use"
          qr_output="$RUNNER_TEMP/r1-hermes-wheel-qr.png"
          qr_log="$RUNNER_TEMP/r1-hermes-wheel-qr.log"
          rm -f "$qr_output" "$qr_log"
          set +e
          "$wheel_qr_venv/bin/r1-hermes" qr --host 127.0.0.1 --port 18789 --protocol ws --token "$dummy_qr_token" --output "$qr_output" >"$qr_log" 2>&1
          qr_exit=$?
          set -e
          "$wheel_qr_venv/bin/python" - "$qr_output" "$qr_log" "$dummy_qr_token" "$qr_exit" <<'PY'
          import sys
          from pathlib import Path

          qr_output = Path(sys.argv[1])
          qr_log = Path(sys.argv[2])
          dummy_qr_token = sys.argv[3]
          qr_exit = int(sys.argv[4])
          output = qr_log.read_text(encoding="utf-8") if qr_log.exists() else ""
          if any(value in output for value in (dummy_qr_token, '"token"', "clawdbot-gateway")):
              raise SystemExit("QR smoke printed secret payload material")
          if qr_exit != 0:
              raise SystemExit(f"QR smoke command failed with safe output:\n{output}")
          if not qr_output.read_bytes().startswith(b"\x89PNG\r\n\x1a\n"):
              raise SystemExit("QR smoke did not produce a PNG")
          if "Wrote secret QR PNG:" not in output:
              raise SystemExit("QR smoke did not report output path")
          PY
      - name: Verify sdist install
        run: |
          sdist_artifacts=(dist/*.tar.gz)
          test "${#sdist_artifacts[@]}" -eq 1
          sdist_venv="$RUNNER_TEMP/r1-hermes-sdist"
          python -m venv "$sdist_venv"
          "$sdist_venv/bin/python" -m pip install --upgrade pip
          "$sdist_venv/bin/python" -m pip install "${sdist_artifacts[0]}"
          "$sdist_venv/bin/python" -m pip check
          "$sdist_venv/bin/r1-hermes" --help
      - name: Verify sdist QR extra
        run: |
          sdist_artifacts=(dist/*.tar.gz)
          test "${#sdist_artifacts[@]}" -eq 1
          sdist_qr_venv="$RUNNER_TEMP/r1-hermes-sdist-qr"
          python -m venv "$sdist_qr_venv"
          "$sdist_qr_venv/bin/python" -m pip install --upgrade pip
          "$sdist_qr_venv/bin/python" -m pip install "${sdist_artifacts[0]}[qr]"
          "$sdist_qr_venv/bin/python" -m pip check
          dummy_qr_token="dummy-ci-qr-token-do-not-use"
          qr_output="$RUNNER_TEMP/r1-hermes-sdist-qr.png"
          qr_log="$RUNNER_TEMP/r1-hermes-sdist-qr.log"
          rm -f "$qr_output" "$qr_log"
          set +e
          "$sdist_qr_venv/bin/r1-hermes" qr --host 127.0.0.1 --port 18789 --protocol ws --token "$dummy_qr_token" --output "$qr_output" >"$qr_log" 2>&1
          qr_exit=$?
          set -e
          "$sdist_qr_venv/bin/python" - "$qr_output" "$qr_log" "$dummy_qr_token" "$qr_exit" <<'PY'
          import sys
          from pathlib import Path

          qr_output = Path(sys.argv[1])
          qr_log = Path(sys.argv[2])
          dummy_qr_token = sys.argv[3]
          qr_exit = int(sys.argv[4])
          output = qr_log.read_text(encoding="utf-8") if qr_log.exists() else ""
          if any(value in output for value in (dummy_qr_token, '"token"', "clawdbot-gateway")):
              raise SystemExit("QR smoke printed secret payload material")
          if qr_exit != 0:
              raise SystemExit(f"QR smoke command failed with safe output:\n{output}")
          if not qr_output.read_bytes().startswith(b"\x89PNG\r\n\x1a\n"):
              raise SystemExit("QR smoke did not produce a PNG")
          if "Wrote secret QR PNG:" not in output:
              raise SystemExit("QR smoke did not report output path")
          PY
