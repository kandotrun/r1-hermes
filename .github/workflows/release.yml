name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify clean checkout and tag version
        run: |
          test -z "$(git status --short)"
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if ref_name.startswith("v") and ref_name != f"v{version}":
              raise SystemExit(f"tag {ref_name} does not match pyproject version {version}")
          PY
      - name: Smoke editable install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,qr]'
      - name: Package metadata
        run: |
          python - <<'PY'
          import importlib.metadata as metadata

          distribution = metadata.distribution("r1-hermes")
          assert distribution.metadata["Name"] == "r1-hermes"
          assert distribution.metadata["Requires-Python"] == ">=3.10"

          scripts = [
              entry_point
              for entry_point in distribution.entry_points
              if entry_point.group == "console_scripts" and entry_point.name == "r1-hermes"
          ]
          assert scripts, "missing r1-hermes console script"
          PY
          python -m pip check
      - name: Dependency audit
        run: |
          python -m pip_audit . --strict --progress-spinner off
          python -m pip_audit --local --progress-spinner off --skip-editable
      - name: CLI help smoke
        run: |
          r1-hermes --help
          r1-hermes serve --help
          r1-hermes hermes --help
          r1-hermes payload --help
          r1-hermes qr --help
          r1-hermes probe --help
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q src tests
      - name: Build wheel and sdist
        run: |
          rm -rf dist build
          python -m build --sdist --wheel
      - name: Inspect artifact contents
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          forbidden_parts = (
              ".r1-hermes",
              "device-token-hmac",
              "devices.json",
              "r1-hermes-secret",
              "r1-hermes.ready",
              "tests/fixtures/r1_payloads",
          )
          forbidden_basenames = (".env",)
          forbidden_basename_prefixes = (".env.",)
          required_wheel = (
              "r1_hermes/systemd/r1-hermes.service",
              "r1_hermes/systemd/r1-hermes.env.example",
          )
          required_sdist = (
              "src/r1_hermes/systemd/r1-hermes.service",
              "src/r1_hermes/systemd/r1-hermes.env.example",
              "packaging/systemd/r1-hermes.service",
              "packaging/systemd/r1-hermes.env.example",
          )
          artifacts = [*Path("dist").glob("*.whl"), *Path("dist").glob("*.tar.gz")]
          if not artifacts:
              raise SystemExit("no release artifacts built")
          for artifact in artifacts:
              if artifact.suffix == ".whl":
                  with zipfile.ZipFile(artifact) as archive:
                      names = archive.namelist()
                  missing = [name for name in required_wheel if name not in names]
              else:
                  with tarfile.open(artifact, "r:gz") as archive:
                      names = archive.getnames()
                  normalized = [name.replace("\\", "/") for name in names]
                  missing = [
                      name
                      for name in required_sdist
                      if not any(path.endswith(f"/{name}") for path in normalized)
                  ]
              if missing:
                  raise SystemExit(f"missing systemd asset(s) in {artifact}: {', '.join(missing)}")
              for name in names:
                  normalized = name.replace("\\", "/")
                  basename = Path(normalized).name
                  if (
                      any(part in normalized for part in forbidden_parts)
                      or basename in forbidden_basenames
                      or any(basename.startswith(prefix) for prefix in forbidden_basename_prefixes)
                  ):
                      raise SystemExit(f"forbidden path in {artifact}: {normalized}")
          PY
      - name: Verify wheel install
        run: |
          wheel_venv="$RUNNER_TEMP/r1-hermes-wheel"
          python -m venv "$wheel_venv"
          "$wheel_venv/bin/python" -m pip install --upgrade pip
          "$wheel_venv/bin/python" -m pip install dist/*.whl
          "$wheel_venv/bin/python" -m pip check
          "$wheel_venv/bin/r1-hermes" --help
      - name: Verify sdist install
        run: |
          sdist_venv="$RUNNER_TEMP/r1-hermes-sdist"
          python -m venv "$sdist_venv"
          "$sdist_venv/bin/python" -m pip install --upgrade pip
          "$sdist_venv/bin/python" -m pip install dist/*.tar.gz
          "$sdist_venv/bin/python" -m pip check
          "$sdist_venv/bin/r1-hermes" --help
      - name: Generate dependency report
        run: |
          python -m venv "$RUNNER_TEMP/release-inspect"
          "$RUNNER_TEMP/release-inspect/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/release-inspect/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/release-inspect/bin/python" -m pip check
          "$RUNNER_TEMP/release-inspect/bin/python" -m pip freeze --all > dist/r1-hermes-dependencies.txt
          "$RUNNER_TEMP/release-inspect/bin/python" -m pip inspect --local > dist/r1-hermes-pip-inspect.json
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz r1-hermes-dependencies.txt r1-hermes-pip-inspect.json > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/r1-hermes-dependencies.txt
            dist/r1-hermes-pip-inspect.json
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            dist/r1-hermes-dependencies.txt \
            dist/r1-hermes-pip-inspect.json \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
